<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
        <link rel="stylesheet" href="/css/contact.css">
        <link rel="stylesheet" href="/css/core.css">
    </head>
    <body>
        <!-- Header Section  -->
        <header class="main__header">
            <div class="container">
                <div class="main__brand">
                    <a href="#"><img src="/Images/logo.png" alt="logo"></a>
                </div>
                <nav class="main__navigation">
                    <ul class="main-navigation__items">
                        <li class="main-navigation__item">
                            <a href="/main.html">Home</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#about-me" class="contact-none" style="text-decoration:line-through;">About me</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#services" class="contact-none" style="text-decoration:line-through;">Services</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#clients" class="contact-none" style="text-decoration:line-through;">Clients</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#portfolio" class="contact-none" style="text-decoration:line-through;">Portfolio</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#blog" class="contact-none" style="text-decoration:line-through;">Blog</a>
                        </li>
                        <li class="main-navigation__item">
                            <a href="#partners" class="contact-none" style="text-decoration:line-through;">Partners</a>
                        </li>
                        <li class="main-navigation__item active">
                            <a href="#">Contact</a>
                        </li>
                    </ul>  
                </nav>
            </div>
        </header>
        <!-- /Header Section  -->


        <!-- Form section-->
        <div class="form__banner">
            <div class="container">
                <section class="contact" id="contact">
                    <div class="get-in">Get in Touch</div>
                    <div class="flex-form">
                        <form action="/main.html" method="get">
                            <textarea name="message" id="message" rows="10" placeholder="Enter Message" required></textarea>
                            <div class="half-flex">
                                <div class="contact-name">
                                    <input type="text" name="name" id="name" placeholder="Enter First Name*" required>
                                </div>
                                <div class="contact-email">
                                    <input type="email" name="email" id="email" placeholder="Enter Email*" required>
                                </div>
                            </div>
                            <input type="text" placeholder="Enter Subject" >
                            <div class="flex-button">
                                <button type="reset" class="form-button block">RESET MESSAGE</button>
                                <button type="submit" class="form-button">SEND MESSAGE</button>
                            </div>
                        </form>
                        <div class="contact-img">
                            <img src="/Images/home-right.png.webp" alt="contact">
                        </div>
                    </div>
                </section>
            </div>
        </div>
        <!-- /Form section-->

        
        <!-- Footer section -->
        <footer class="footer" id="footer">
            <div class="container">
                <div class="footer__brand">
                    <a href="#"><img src="/Images/partner-2.png" alt="logo"></a>
                </div>
                <nav class="footer__navigation">
                    <ul class="footer-navigation__items">
                        <li class="footer-navigation__item">
                            <a href="#">Home</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#about-me">About me</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#services">Services</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#clients">Clients</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#portfolio">Portfolio</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#blog">Blog</a>
                        </li>
                        <li class="footer-navigation__item">
                            <a href="#partners">Partners</a>
                        </li>
                    </ul>  
                </nav>
                <hr>
                <p class="copy"> All right &copy;2023 Copyright / this made by Bunyod</p>
            </div>
        </footer>
        <!-- /Footer section -->
    </body>
</html>
